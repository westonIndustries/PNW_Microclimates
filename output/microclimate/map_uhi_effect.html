            };
            legend.addTo(map);
            
            // Add title
            var title = L.control({position: 'topleft'});
            title.onAdd = function(map) {
                var div = L.DomUtil.create('div', 'info');
                div.innerHTML = '<h3 style="margin: 0;">Urban Heat Island Effect (°F)</h3>';
                return div;
            };
            title.addTo(map);
        </script>
    </body>
    </html>
